<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Martial Arts - Trial Class Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Dragon Martial Arts</h1>

<h2>Book a Free Trial Class</h2>

<p>Please complete the form below to book your trial class.</p>

<form>

<label>Full Name</label>
<input type="text">

<label>Email Address</label>
<input type="email">

<label>Phone Number</label>
<input type="tel">

<label>Age</label>
<input type="number">

<label>Martial Arts Program</label>
<select>
<option>Karate</option>
<option>Taekwondo</option>
<option>Kickboxing</option>
<option>Brazilian Jiu-Jitsu</option>
</select>

<label>Preferred Date</label>
<input type="date">

<label>Experience Level</label>
<select>
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select>

<label>Additional Message</label>
<textarea rows="4"></textarea>

<button type="submit">Book Trial Class</button>

</form>

</div>

</body>
</html>
